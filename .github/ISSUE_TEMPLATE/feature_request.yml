name: Feature request
description: Propose an improvement or new capability
labels: ["type:feat", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What were you trying to do when you wished Margin did this?
        Concrete workflow beats abstract feature.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should happen, including keybinding/flag/config ideas if you have them.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / workarounds you considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I checked ROADMAP.md's "explicitly out of scope" section and this isn't on it
          required: true
