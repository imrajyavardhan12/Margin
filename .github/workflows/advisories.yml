name: Advisories

# cargo-deny fetches the RUSTSEC database live, so a new advisory fails
# whichever unrelated PR runs CI next (git2 on 2026-06-24, quick-xml on
# 2026-07-03). This daily run pins the failure to main with an honest
# name instead.

on:
  schedule:
    - cron: "0 5 * * *" # daily, 05:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  advisories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check advisories
