name: Fuzz

on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      seconds:
        description: "Seconds per target"
        default: "900"
  pull_request:
    paths:
      - "crates/margin-core/**"
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"

permissions:
  contents: read

jobs:
  fuzz:
    name: fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [parse_unified, strip_ansi, intraline]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-fuzz
      # Persist the coverage-grown corpus across runs so each week fuzzes
      # deeper instead of re-discovering the same frontier from the static
      # seeds. run_id in the key makes every run save; restore-keys pulls
      # the most recent prior corpus.
      - uses: actions/cache@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-
      - name: Seed corpus from the parser test suite
        run: ./fuzz/seed.sh
      - name: Decide time budget
        id: budget
        env:
          EVENT: ${{ github.event_name }}
          REQUESTED: ${{ github.event.inputs.seconds || '900' }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            seconds=60 # smoke run on parser PRs
          else
            case "$REQUESTED" in
              *[!0-9]*|"") seconds=900 ;;
              *) seconds="$REQUESTED" ;;
            esac
          fi
          echo "seconds=$seconds" >> "$GITHUB_OUTPUT"
      - name: Fuzz
        # +nightly explicitly: the runner's default toolchain stays stable,
        # and libFuzzer's -Z sanitizer flags are nightly-only.
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=${{ steps.budget.outputs.seconds }} \
            -timeout=10 \
            -rss_limit_mb=4096
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
