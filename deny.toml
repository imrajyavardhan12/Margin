# cargo-deny configuration (checked in CI; see .github/workflows/ci.yml)

[advisories]
version = 2
yanked = "deny"
ignore = [
    # paste is an unmaintained proc-macro pulled in by ratatui 0.29.
    # Compile-time only, no runtime exposure; remove this entry when
    # ratatui drops it (tracked upstream).
    "RUSTSEC-2024-0436",
    # syntect 5 loads its bundled syntax/theme dumps with bincode 1
    # (unmaintained) and parses .sublime-syntax via yaml-rust
    # (unmaintained). Both operate on syntect's own embedded assets, not
    # untrusted input; every syntect consumer (bat, delta) carries these.
    # Drop when syntect migrates off them.
    "RUSTSEC-2025-0141", # bincode 1.x
    "RUSTSEC-2024-0320", # yaml-rust
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0", # syntect's onig bindings ship MPL parts; weak copyleft is fine for a binary
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal path dependencies carry no version pre-publish;
# registry wildcards remain denied.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
