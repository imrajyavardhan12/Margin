# cargo-deny configuration (checked in CI; see .github/workflows/ci.yml)

[advisories]
version = 2
yanked = "deny"
ignore = [
    # syntect 5 loads its bundled syntax/theme dumps with bincode 1
    # (unmaintained) and parses .sublime-syntax via yaml-rust
    # (unmaintained). Both operate on syntect's own embedded assets, not
    # untrusted input; every syntect consumer (bat, delta) carries these.
    # Drop when syntect migrates off them.
    "RUSTSEC-2025-0141", # bincode 1.x
    "RUSTSEC-2024-0320", # yaml-rust
    # quick-xml < 0.41 DoS advisories (quadratic attr scan, unbounded
    # namespace allocation). Reached only via syntect -> plist, whose
    # requirement caps quick-xml below the fixed 0.41; Margin never feeds
    # XML to plist at runtime (themes are syntect's embedded dumps; custom
    # user themes are TOML, issue #15). Drop when plist moves to >=0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0", # syntect's onig bindings ship MPL parts; weak copyleft is fine for a binary
    "CC0-1.0", # notify (watch mode, issue #12): public-domain dedication
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal path dependencies carry no version pre-publish;
# registry wildcards remain denied.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
