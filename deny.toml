# cargo-deny configuration (checked in CI; see .github/workflows/ci.yml)

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0", # syntect's onig bindings ship MPL parts; weak copyleft is fine for a binary
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal path dependencies carry no version pre-publish;
# registry wildcards remain denied.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
